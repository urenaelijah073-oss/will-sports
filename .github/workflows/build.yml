name: Build Wii DOL

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip source
        run: |
          unzip -o Will_Sports_Wii_Source.zip
          ls -la
          find . -maxdepth 3 -type f

      - name: Build
        run: |
          source /etc/profile.d/devkit-env.sh || true
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=/opt/devkitpro/devkitPPC
          export PATH="$DEVKITPPC/bin:$DEVKITPRO/tools/bin:$PATH"

          cd Will_Sports_Wii_Source

          awk '
            { print }
            $0 == "include $(DEVKITPPC)/wii_rules" {
              print "CFLAGS := -g -O2 -Wall $(MACHDEP)"
              print "LDFLAGS := -g $(MACHDEP)"
            }
          ' Makefile > Makefile.fixed
          mv Makefile.fixed Makefile

          make clean || true
          make all
          find . -type f
          cp boot.dol ../boot.dol

      - name: Upload boot.dol
        uses: actions/upload-artifact@v4
        with:
          name: boot-dol
          path: boot.dol
